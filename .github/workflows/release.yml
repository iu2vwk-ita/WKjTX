name: Create GitHub Release

# On a `v*` tag, attach the Windows installer built by the
# build-windows workflow as a downloadable asset on a draft GitHub
# Release. The human (release manager) publishes the draft after
# reviewing the attached binary.

on:
  workflow_run:
    workflows: ["Build Windows"]
    types: [completed]

jobs:
  release:
    name: Draft GitHub Release
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      startsWith(github.event.workflow_run.head_branch, 'v')
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download installer artifact
        uses: actions/download-artifact@v4
        with:
          name: wkjtx-windows-installer
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: installer/

      - name: Compute SHA-256 of installer
        id: sha
        run: |
          cd installer
          sha256sum wkjtx-*.exe > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Draft the release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            installer/wkjtx-*.exe
            installer/SHA256SUMS.txt
